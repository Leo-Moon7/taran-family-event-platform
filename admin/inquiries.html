<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>운영 예외 | 손품해방 운영센터</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/reset.css">
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/components/button.css">
  <link rel="stylesheet" href="../styles/components/form.css">
  <link rel="stylesheet" href="../styles/pages/admin.css">
  <script src="../scripts/core/brand.js"></script>
  <script src="../scripts/core/storage.js"></script>
  <script src="../content-config.js"></script>
  <script src="../scripts/core/config.js"></script>
  <script src="../scripts/core/api.js"></script>
  <script src="../scripts/core/auth.js"></script>
</head>
<body class="admin-app" data-admin-view="inquiries">
  <header class="admin-topbar" data-admin-header></header>
  <div class="admin-layout">
    <nav class="admin-sidebar" data-admin-sidebar></nav>
    <main class="admin-main">
      <header class="admin-page-head">
        <div><p>운영 예외</p><h1>확인이 필요한 항목</h1></div>
      </header>
      <section class="admin-section admin-section--plain">
        <p class="admin-help">정상적으로 전달되고 답변되는 문의에는 관리자가 개입하지 않습니다. 24시간 미응답, 알림 실패, 오래된 업체 정보와 인증 요청만 표시됩니다.</p>
      </section>
      <form class="admin-filter" data-exception-filter>
        <label>유형
          <select name="type">
            <option value="all">전체</option>
            <option value="claim">업체 소유권</option>
            <option value="registration">신규 업체 등록</option>
            <option value="delivery">문의 전송 실패</option>
            <option value="unanswered">24시간 미응답</option>
            <option value="notification">알림 처리 실패</option>
            <option value="nonresponse">반복 미응답 업체</option>
            <option value="stale">업체 정보 갱신</option>
          </select>
        </label>
        <label>검색<input name="query" placeholder="업체명 또는 문의 번호"></label>
        <button class="button button--secondary" type="submit">적용</button>
      </form>
      <p class="admin-result-count" data-exception-count></p>
      <div class="admin-table-wrap">
        <table>
          <thead><tr><th>발생일</th><th>유형</th><th>대상</th><th>확인할 내용</th><th>상태</th><th>이동</th></tr></thead>
          <tbody data-admin-table></tbody>
        </table>
      </div>
      <div class="admin-empty" data-admin-empty hidden>현재 확인이 필요한 운영 예외가 없습니다.</div>
    </main>
  </div>
  <script src="../scripts/components/admin-shell.js"></script>
  <script src="../scripts/pages/admin/data.js"></script>
  <script src="../scripts/pages/admin/common.js"></script>
  <script src="../scripts/pages/admin/inquiries.js"></script>
</body>
</html>
