[build]
  command = "node scripts/build/prepare-dist.mjs"
  publish = "dist"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin-review.html"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/vendor-dashboard.html"
  to = "/admin/providers.html"
  status = 301

[[redirects]]
  from = "/venue.html"
  to = "/provider.html"
  status = 301

[[redirects]]
  from = "/favicon.ico"
  to = "/assets/images/taran-logo-mark.svg"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co; font-src 'self' data:; frame-ancestors 'none'; form-action 'self'; base-uri 'self'"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store"
    X-Robots-Tag = "noindex, nofollow"
