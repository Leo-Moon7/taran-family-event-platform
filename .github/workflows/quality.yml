name: Quality checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate source and security rules
        run: npm test
      - name: Build Netlify deployment bundle
        run: npm run build
      - name: Validate Netlify deployment bundle
        run: npm run test:dist
